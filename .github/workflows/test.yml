name: Rain Alert Setup Check

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt NOT FOUND!"
            exit 1
          fi

      - name: Check Rain Alert secrets are configured
        env:
          api_key: ${{ secrets.api_key }}
          account_sid: ${{ secrets.account_sid }}
          auth_token: ${{ secrets.auth_token }}
        run: |
          if [ -z "$api_key" ]; then
            echo "ERROR: api_key secret is missing!"
            exit 1
          fi
          if [ -z "$account_sid" ]; then
            echo "ERROR: account_sid secret is missing!"
            exit 1
          fi
          if [ -z "$auth_token" ]; then
            echo "ERROR: auth_token secret is missing!"
            exit 1
          fi
          echo "All Rain Alert secrets (API Key, SID, Token) are configured!"

      - name: Check required files exist
        run: |
          if [ -f "main.py" ]; then
            echo "main.py found"
          else
            echo "main.py NOT FOUND!"
            exit 1
          fi

      - name: Test Python syntax
        run: python -m py_compile main.py && echo "Python syntax OK"

      - name: Final Success Message
        run: |
          echo "========================================"
          echo "      RAIN ALERT SETUP IS READY!      "
          echo "========================================"
